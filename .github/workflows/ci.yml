name: Build Check

on:
  push:
    branches: [ "**" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies (GUI)
        run: dotnet restore CyberAwarenessBot.Gui/CyberAwarenessBot.Gui.csproj

      - name: Build GUI
        run: dotnet build CyberAwarenessBot.Gui/CyberAwarenessBot.Gui.csproj --no-restore